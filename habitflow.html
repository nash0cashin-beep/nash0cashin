<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HabitFlow — Habit Tracker & Daily Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   RESET & ROOT VARIABLES
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Light theme */
  --bg:#F7F5F0;
  --bg2:#EFEDE6;
  --bg3:#E5E2D8;
  --bg4:#DDDAC FFFFFFFFFFFF;
  --surface:#FFFFFF;
  --surface2:#FAF9F6;
  --surface3:#F2F0EB;
  --txt:#1A1916;
  --txt2:#5C5A54;
  --txt3:#9B9890;
  --txt4:#C4C2BA;
  --border:rgba(26,25,22,0.09);
  --border2:rgba(26,25,22,0.06);
  --border3:rgba(26,25,22,0.04);
  /* Accent — organic forest green */
  --green:#2D6A1F;
  --green2:#3D8A2A;
  --green3:#5CAD3E;
  --green4:#8ECB76;
  --greenbg:#EAF4E4;
  --greenbg2:#D0EABF;
  /* Amber */
  --amber:#B5620A;
  --amberbg:#FDF0E0;
  --amberlight:#F0A84A;
  /* Coral */
  --coral:#B83020;
  --coralbg:#FDECE9;
  /* Purple */
  --purple:#5044B0;
  --purplebg:#EEEDFB;
  /* Blue */
  --blue:#1A5FA8;
  --bluebg:#E6F0FB;
  /* Shadow */
  --shadow-sm:0 1px 2px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.04);
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.05);
  --shadow-md:0 2px 6px rgba(0,0,0,.07),0 8px 28px rgba(0,0,0,.07);
  --shadow-lg:0 4px 12px rgba(0,0,0,.1),0 16px 48px rgba(0,0,0,.12);
  /* Border radius */
  --r-sm:6px;--r:12px;--r-md:16px;--r-lg:24px;
  /* Sidebar */
  --sidebar-w:240px;
  /* Transitions */
  --t:.18s cubic-bezier(.4,0,.2,1);
  --t-slow:.35s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"]{
  --bg:#111110;
  --bg2:#191917;
  --bg3:#212120;
  --surface:#191917;
  --surface2:#212120;
  --surface3:#282826;
  --txt:#F0EEE8;
  --txt2:#9E9C94;
  --txt3:#5C5A54;
  --txt4:#3A3936;
  --border:rgba(240,238,232,0.08);
  --border2:rgba(240,238,232,0.05);
  --border3:rgba(240,238,232,0.03);
  --greenbg:#152D0E;
  --greenbg2:#1F4214;
  --amberbg:#2E1A05;
  --coralbg:#2E0E09;
  --purplebg:#1C1840;
  --bluebg:#0A1F38;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3),0 2px 8px rgba(0,0,0,.2);
  --shadow:0 1px 3px rgba(0,0,0,.35),0 4px 16px rgba(0,0,0,.25);
  --shadow-md:0 2px 6px rgba(0,0,0,.4),0 8px 28px rgba(0,0,0,.3);
  --shadow-lg:0 4px 12px rgba(0,0,0,.5),0 16px 48px rgba(0,0,0,.4);
}

/* Rest of CSS remains the same... */
</style>
</head>
